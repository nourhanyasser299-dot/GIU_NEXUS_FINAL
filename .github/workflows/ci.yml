name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint + test + audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          # mongodb-memory-server downloads a binary on first run and caches it
          # under node_modules. CI is allowed to download it; lock the version
          # so the cache is deterministic.
          MONGOMS_VERSION: '6.0.14'

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
